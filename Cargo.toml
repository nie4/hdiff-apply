[workspace]
resolver = "2"
members = ["hdiff-apply", "seven-zip", "common", "hpatchz"]

[workspace.dependencies]
anyhow = "1.0.100"
thiserror = "2.0.17"
clap = { version = "4.5.54", features = ["derive"] }
crossterm = "0.29.0"
ruzstd = "0.8.2"
serde = { version = "1.0.217", features = ["derive"] }
prost = "0.14.3"
rayon = "1.11.0"
tempfile = "3.24.0"
walkdir = "2.5.0"
serde_json = "1.0.149"
indicatif = "0.18.3"

common = { path = "common/" }
seven-zip = { path = "seven-zip/" }
hpatchz = { path = "hpatchz/" }

[profile.release]
strip = true
lto = true
opt-level = 3
codegen-units = 1
